<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - York Heritage</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #C8860A;
            --secondary: #2C1A0E;
            --bg-neutral: #F5F0EB;
            --radius-md: 16px;
            --radius-sm: 12px;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg-neutral);
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-neutral);
            min-height: 100vh;
            padding-bottom: 90px;
        }
        .cafe-header {
            background: white;
            padding: 20px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--secondary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .orders-content {
            padding: 20px;
        }
        .order-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }
        .order-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .order-code {
            font-family: monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--secondary);
            letter-spacing: 1px;
        }
        .order-date {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #FFF3E0; color: #FF9800; }
        .status-processing { background: #E3F2FD; color: #2196F3; }
        .status-completed { background: #E8F5E9; color: #4CAF50; }
        .status-cancelled { background: #FFEBEE; color: #F44336; }
        .order-items-preview {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .order-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #F0E8E0;
        }
        .order-total {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }
        .order-arrow {
            color: #ccc;
            font-size: 14px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 60px;
            margin-bottom: 16px;
            color: #ddd;
        }
        .empty-state p {
            font-size: 16px;
            margin-bottom: 8px;
        }
        .empty-state a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .loading-state i {
            font-size: 40px;
            margin-bottom: 16px;
            color: var(--primary);
        }

        /* Modal Detail */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 500;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-sheet {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #E0D8D0;
            border-radius: 2px;
            margin: 0 auto 20px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 16px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #F0E8E0;
            font-size: 14px;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label { color: #888; }
        .detail-value { font-weight: 500; color: var(--secondary); }
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }
        .item-qty { color: var(--primary); font-weight: 600; margin-right: 6px; }
        .section-title {
            font-weight: 600;
            color: var(--secondary);
            margin: 16px 0 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-close-modal {
            width: 100%;
            padding: 14px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-pay-now {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #E6A017);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 20px;
            max-width: 600px;
            margin: 0 auto;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #999;
            gap: 4px;
            font-size: 11px;
        }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="cafe-header">
            <div class="header-top">
                <button class="back-btn" onclick="history.back()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2>My Orders</h2>
                <button class="back-btn" onclick="loadOrders()" title="Refresh">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </header>

        <div class="orders-content">
            <div id="ordersList">
                <div class="loading-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Loading orders...</p>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="menu.html" class="nav-item">
                <i class="fa-solid fa-utensils"></i>
                <span>Menu</span>
            </a>
            <a href="cart.html" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span>Cart</span>
            </a>
            <a href="orders.html" class="nav-item active">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Orders</span>
            </a>
        </nav>
    </div>

    <!-- Modal Detail Order -->
    <div class="modal-overlay" id="orderDetailModal">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div id="orderDetailContent"></div>
            <button class="btn-close-modal" onclick="closeModal()">Close</button>
            <button class="btn-pay-now" id="payNowBtn" style="display:none;" onclick="goToPayment()">
                <i class="fa-solid fa-qrcode"></i> View QR Payment
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://jlagwghdwyrejsapourt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_qjTC0cTyjCMaqAHvXLlI6g_EhU3_caa';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allOrders = [];

        function formatPrice(price) {
            return new Intl.NumberFormat('id-ID').format(price);
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('id-ID', { 
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function getStatusLabel(status) {
            const map = {
                pending: 'Pending',
                processing: 'Processing',
                completed: 'Completed',
                cancelled: 'Cancelled'
            };
            return map[status] || status;
        }

        async function loadOrders() {
            const customerName = localStorage.getItem('customerName');
            const container = document.getElementById('ordersList');

            container.innerHTML = `
                <div class="loading-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>Loading orders...</p>
                </div>`;

            try {
                let query = supabase
                    .from('orders')
                    .select(`
                        *,
                        order_items (
                            id,
                            quantity,
                            notes,
                            subtotal,
                            menus ( name )
                        )
                    `)
                    .order('created_at', { ascending: false })
                    .limit(30);

                if (customerName && customerName !== 'Guest') {
                    query = query.eq('customer_name', customerName);
                }

                const { data: orders, error } = await query;

                if (error) throw error;

                allOrders = orders || [];

                if (allOrders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-regular fa-receipt"></i>
                            <p>No orders found</p>
                            <p style="font-size:13px; margin-top: 8px;">
                                <a href="menu.html">Browse our menu →</a>
                            </p>
                        </div>`;
                    return;
                }

                container.innerHTML = allOrders.map(order => {
                    const itemsPreview = (order.order_items || [])
                        .slice(0, 3)
                        .map(i => `${i.quantity}x ${i.menus?.name || 'Item'}`)
                        .join(', ');
                    const moreCount = (order.order_items || []).length - 3;

                    return `
                    <div class="order-card" onclick="openOrderDetail('${order.id}')">
                        <div class="order-card-header">
                            <div>
                                <div class="order-code">${order.kode_order || order.id.slice(0,8).toUpperCase()}</div>
                                <div class="order-date">${formatDate(order.created_at)}</div>
                            </div>
                            <span class="status-badge status-${order.status}">${getStatusLabel(order.status)}</span>
                        </div>
                        <div class="order-items-preview">
                            ${itemsPreview}${moreCount > 0 ? ` +${moreCount} more` : ''}
                        </div>
                        <div class="order-card-footer">
                            <span class="order-total">Rp ${formatPrice(order.total_price)}</span>
                            <i class="fa-solid fa-chevron-right order-arrow"></i>
                        </div>
                    </div>`;
                }).join('');

            } catch (err) {
                console.error('Error loading orders:', err);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-circle-exclamation"></i>
                        <p>Failed to load orders</p>
                        <p style="font-size:13px; margin-top:8px;">${err.message}</p>
                        <a href="#" onclick="loadOrders(); return false;" 
                           style="color: var(--primary); font-weight:600; font-size:14px; margin-top:12px; display:inline-block;">
                           Try Again
                        </a>
                    </div>`;
            }
        }

        function openOrderDetail(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;

            const content = document.getElementById('orderDetailContent');
            const payBtn = document.getElementById('payNowBtn');

            const itemsHtml = (order.order_items || []).map(item => `
                <div class="detail-item">
                    <div>
                        <span class="item-qty">${item.quantity}x</span>
                        <span>${item.menus?.name || 'Item'}</span>
                        ${item.notes ? `<br><small style="color:#999; font-size:11px; margin-left:22px;">Note: ${item.notes}</small>` : ''}
                    </div>
                    <span style="font-weight:500;">Rp ${formatPrice(item.subtotal)}</span>
                </div>
            `).join('');

            content.innerHTML = `
                <div class="modal-title">Order Detail</div>

                <div class="section-title">Info</div>
                <div class="detail-row">
                    <span class="detail-label">Order Code</span>
                    <span class="detail-value" style="font-family:monospace;">${order.kode_order || '-'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Customer</span>
                    <span class="detail-value">${order.customer_name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date</span>
                    <span class="detail-value">${formatDate(order.created_at)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="status-badge status-${order.status}">${getStatusLabel(order.status)}</span>
                </div>

                <div class="section-title">Items</div>
                ${itemsHtml || '<p style="color:#999; font-size:13px;">No items found</p>'}

                <div style="margin-top:12px; padding-top:12px; border-top:2px solid #F0E8E0;">
                    <div class="detail-row" style="font-size:16px;">
                        <span style="font-weight:700;">Total</span>
                        <span style="font-weight:700; color:var(--primary);">Rp ${formatPrice(order.total_price)}</span>
                    </div>
                </div>
            `;

            // Tampilkan tombol bayar jika status pending dan ini order terkini user
            const currentOrderId = localStorage.getItem('currentOrderId');
            if (order.status === 'pending' && order.id === currentOrderId) {
                payBtn.style.display = 'block';
            } else {
                payBtn.style.display = 'none';
            }

            document.getElementById('orderDetailModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('orderDetailModal').classList.remove('open');
        }

        function goToPayment() {
            window.location.href = 'payment.html';
        }

        // Close modal if clicking backdrop
        document.getElementById('orderDetailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Load on init
        loadOrders();
    </script>
</body>
</html>
